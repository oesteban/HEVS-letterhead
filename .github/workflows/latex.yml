name: LaTeX

on:
  push:
  pull_request:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pixi
        uses: prefix-dev/setup-pixi@v0.8.1

      - name: Prepare letter data
        run: cp letter.yaml.example letter.yaml

      - name: Render letter
        run: pixi run render

      - name: Lint with chktex
        run: pixi run lint

      - name: Build PDF
        run: pixi run build

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: letterhead-pdf
          path: letter.pdf

      - name: Upload PDF to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" letter.pdf
